name: Deploy — App Service (WebApi)

on:
  push:
    branches: [main]
    paths:
      - 'src/WebApi/**'
      - 'src/Shared/**'
      - '.github/workflows/deploy-webapi.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Open SCM access restriction
        run: |
          az rest \
            --method PATCH \
            --url "https://management.azure.com/subscriptions/dae0ab95-2ef9-42e4-89a5-a530e521e136/resourceGroups/ordle-rg/providers/Microsoft.Web/sites/ordle-webapi/config/web?api-version=2022-03-01" \
            --body '{"properties":{"scmIpSecurityRestrictions":[{"ipAddress":"Any","action":"Allow","priority":2147483647,"name":"Allow all"}],"scmIpSecurityRestrictionsUseMain":false}}'

      - name: Publish
        run: dotnet publish src/WebApi/WebApi.csproj -c Release -o publish

      - name: Zip publish output
        run: cd publish && zip -r ../deploy.zip . && cd ..

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --resource-group ordle-rg \
            --name ordle-webapi \
            --src-path deploy.zip \
            --type zip

      - name: Set App Settings
        run: |
          az webapp config appsettings set \
            --resource-group ordle-rg \
            --name ordle-webapi \
            --settings \
              "ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONNECTION_STRING }}" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              "BlobStorage__ConnectionString=${{ secrets.BLOB_CONNECTION_STRING }}" \
              "ASPNETCORE_ENVIRONMENT=Production"
